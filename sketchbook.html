<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musa Soko | Scratchbook (WIP)</title>
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Pixelify+Sans:wght@400..700&family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --purple: #6513e0;
        --red: #e24632;
        --orange: #fdba4a;
        --ink: #16121f;
        --paper: #ffffff;
        --ui: Tahoma, "MS Sans Serif", Geneva, sans-serif;
        --pixel: "Pixelify Sans", Tahoma, sans-serif;
        --mono: "VT323", monospace;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
      }
      body {
        font-family: var(--ui);
        color: var(--ink);
        background: var(--purple);
        background-image:
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.04) 0 1px,
            transparent 1px 3px
          ),
          repeating-linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.05) 0 1px,
            transparent 1px 3px
          );
        min-height: 100vh;
        padding: 0;
        overflow-x: hidden;
        -webkit-user-select: none;
        user-select: none;
      }
      svg {
        shape-rendering: crispEdges;
      }

      /* back link */
      .back {
        position: fixed;
        top: 16px;
        left: 18px;
        z-index: 20;
        font-family: var(--pixel);
        font-size: 16px;
        color: #fff;
        text-decoration: none;
        opacity: 0.9;
      }
      .back:hover {
        text-decoration: underline;
      }

      /* ===== the WIP window ===== */
      .wip {
        width: min(820px, 94vw);
        background: var(--paper);
        border: 1px solid var(--ink);
        box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.35);
      }
      .titlebar {
        height: 28px;
        background: var(--red);
        color: #fff;
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 0 4px 0 9px;
        border-bottom: 1px solid var(--ink);
      }
      .titlebar .nm {
        flex: 1;
        font-family: var(--pixel);
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ctrl {
        width: 19px;
        height: 17px;
        background: var(--paper);
        border: 1px solid var(--ink);
        box-shadow:
          inset 1px 1px 0 #fff,
          inset -1px -1px 0 #999;
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 700;
        color: var(--ink);
        cursor: pointer;
        text-decoration: none;
      }
      .wip-body {
        padding: 16px;
      }

      /* the 16:9 illustration area */
      .art {
        position: relative;
        aspect-ratio: 16 / 9;
        border: 1px solid var(--ink);
        background: var(--paper);
        background-image: repeating-linear-gradient(
          45deg,
          rgba(253, 186, 74, 0.5) 0 14px,
          rgba(255, 255, 255, 0) 14px 28px
        );
        display: grid;
        place-items: center;
        text-align: center;
        overflow: hidden;
      }
      .art .stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 16px;
      }
      .art .hazard {
        filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.25));
      }
      .art h1 {
        font-family: var(--pixel);
        font-weight: 700;
        font-size: clamp(26px, 5vw, 46px);
        line-height: 0.95;
        color: var(--ink);
        letter-spacing: 0.5px;
      }
      .art h1 .alt {
        color: var(--purple);
      }
      .art .sub {
        font-family: var(--mono);
        font-size: clamp(16px, 2.4vw, 20px);
        color: var(--ink);
        background: var(--orange);
        border: 1px solid var(--ink);
        padding: 2px 10px;
      }

      .blurb {
        margin: 16px 2px 4px;
        font-size: 13.5px;
        line-height: 1.5;
        color: var(--ink);
      }
      .blurb b {
        color: var(--purple);
      }

      .shuffle-row {
        margin-top: 16px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .shuffle {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-family: var(--pixel);
        font-weight: 700;
        font-size: 18px;
        color: var(--ink);
        background: var(--orange);
        border: 1px solid var(--ink);
        box-shadow: 3px 3px 0 var(--ink);
        padding: 9px 18px;
        cursor: pointer;
      }
      .shuffle:active {
        transform: translate(3px, 3px);
        box-shadow: 0 0 0 var(--ink);
      }
      .shuffle-note {
        font-family: var(--mono);
        font-size: 16px;
        color: #555;
      }

      /* ===== floating windows (shuffled scraps) ===== */
      .win {
        position: fixed;
        min-width: 240px;
        display: flex;
        flex-direction: column;
        background: var(--paper);
        border: 1px solid var(--ink);
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
        z-index: 100;
      }
      .win .titlebar {
        cursor: grab;
        background: var(--purple);
      }
      .win.inactive .titlebar {
        background: #8a86a0;
      }
      .win .body {
        padding: 9px;
        background: var(--paper);
        overflow: auto;
      }
      .win .media {
        width: 100%;
        aspect-ratio: var(--ar, 1);
        background: #f0eef6;
        border: 1px solid #b8b3c8;
        margin-bottom: 9px;
        display: block;
      }
      .win .media img,
      .win .media iframe,
      .win .media video {
        width: 100%;
        height: 100%;
        border: 0;
        object-fit: contain;
        display: block;
        image-rendering: pixelated;
      }
      .win .bigph {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        font-family: var(--pixel);
        color: var(--ink);
        background-image: repeating-linear-gradient(
          45deg,
          rgba(101, 19, 224, 0.1) 0 8px,
          transparent 8px 16px
        );
      }
      .win .info {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
      }
      .tag {
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1;
        padding: 2px 6px 1px;
        color: #fff;
        background: var(--purple);
        border: 1px solid var(--ink);
      }
      .win .info .yr {
        margin-left: auto;
        font-family: var(--mono);
        font-size: 14px;
        color: #666;
      }
      .resize-grip {
        position: absolute;
        right: 1px;
        bottom: 1px;
        width: 15px;
        height: 15px;
        cursor: nwse-resize;
        background: repeating-linear-gradient(
          135deg,
          transparent 0 2px,
          var(--ink) 2px 3px,
          transparent 3px 5px
        );
      }

      /* player */
      .player {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 9px;
      }
      .pbtn {
        width: 26px;
        height: 22px;
        flex: none;
        background: var(--paper);
        border: 1px solid var(--ink);
        box-shadow:
          inset 1px 1px 0 #fff,
          inset -1px -1px 0 #999;
        cursor: pointer;
        display: grid;
        place-items: center;
        color: var(--ink);
        font-size: 11px;
      }
      .pbtn:active {
        box-shadow:
          inset 1px 1px 0 #999,
          inset -1px -1px 0 #fff;
      }
      .ptime {
        font-family: var(--mono);
        font-size: 15px;
        color: #222;
      }
      .seek {
        -webkit-appearance: none;
        appearance: none;
        flex: 1;
        height: 18px;
        background: transparent;
        cursor: pointer;
      }
      .seek::-webkit-slider-runnable-track {
        height: 10px;
        background: #e7e3f0;
        border: 1px solid var(--ink);
      }
      .seek::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 11px;
        height: 18px;
        margin-top: -5px;
        background: var(--red);
        border: 1px solid var(--ink);
      }
      .seek::-moz-range-thumb {
        width: 11px;
        height: 18px;
        border-radius: 0;
        background: var(--red);
        border: 1px solid var(--ink);
      }
      .endcard {
        text-align: center;
        padding: 8px 6px 6px;
      }
      .endcard-big {
        font-family: var(--pixel);
        font-weight: 700;
        font-size: 26px;
        line-height: 1;
        color: var(--ink);
        margin-bottom: 10px;
      }
      .endcard p {
        font-size: 12.5px;
        line-height: 1.5;
        color: #444;
        margin-bottom: 16px;
      }
      .endcard-btn {
        font-family: var(--pixel);
        font-weight: 700;
        font-size: 15px;
        color: var(--ink);
        background: var(--orange);
        border: 1px solid var(--ink);
        box-shadow: 3px 3px 0 var(--ink);
        padding: 7px 16px;
        cursor: pointer;
      }
      .endcard-btn:active {
        transform: translate(3px, 3px);
        box-shadow: 0 0 0 var(--ink);
      }
      /* ===== header ===== */
      .head {
        max-width: 1120px;
        margin: 0 auto;
        padding: 70px 24px 20px;
      }
      .head-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }
      .page-title {
        font-family: var(--pixel);
        font-weight: 700;
        font-size: clamp(34px, 6vw, 56px);
        line-height: 1;
        color: #fff;
        letter-spacing: 0.5px;
      }
      .page-blurb {
        margin-top: 16px;
        max-width: 640px;
        font-size: 14px;
        line-height: 1.55;
        color: rgba(255, 255, 255, 0.85);
      }
      .page-blurb b {
        color: var(--orange);
      }

      /* ===== masonry board ===== */
      .board {
        column-width: 250px;
        column-gap: 20px;
        max-width: 1140px;
        margin: 0 auto;
        padding: 14px 26px 90px;
      }

      /* ── every tile is its own little window ── */
      .pin {
        break-inside: avoid;
        margin: 0 0 20px;
        background: var(--paper);
        border: 1px solid var(--ink);
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
        cursor: pointer;
        transition:
          box-shadow 0.12s ease,
          transform 0.12s ease;
      }
      .pin:hover {
        transform: translate(-1px, -1px);
        box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.5);
      }
      .pin .tbar {
        height: 24px;
        background: var(--red);
        color: #fff;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 4px 0 7px;
        border-bottom: 1px solid var(--ink);
      }
      .pin .tico {
        flex: none;
      }
      .pin .tname {
        flex: 1;
        font-family: var(--pixel);
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pin .tbtns {
        display: flex;
        gap: 3px;
        flex: none;
      }
      .pin .tbtns i {
        width: 15px;
        height: 13px;
        display: grid;
        place-items: center;
        font-style: normal;
        font-size: 9px;
        line-height: 1;
        color: var(--ink);
        background: var(--paper);
        border: 1px solid var(--ink);
        box-shadow:
          inset 1px 1px 0 #fff,
          inset -1px -1px 0 #999;
      }
      .pin .pbody {
        padding: 5px;
      }
      .pin .photo {
        display: block;
        line-height: 0;
        background: #14101d;
        border: 1px solid var(--ink);
        box-shadow:
          inset 1px 1px 0 #999,
          inset -1px -1px 0 #fff;
        overflow: hidden;
      }
      .pin .photo img,
      .pin .photo video {
        width: 100%;
        height: auto;
        display: block;
      }
      .pin .pstatus {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 4px 7px 7px;
      }
      .pin .pname {
        font-family: var(--mono);
        font-size: 14px;
        line-height: 1;
        color: #555;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* WIP window: same chrome, custom body */
      .pin.wipwin,
      .pin.wipwin:hover {
        cursor: default;
        transform: none;
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
      }
      .pin.wipwin .wart {
        aspect-ratio: 5 / 3;
        display: grid;
        place-items: center;
        border: 1px solid var(--ink);
        margin: 5px 5px 0;
        background-image: repeating-linear-gradient(
          45deg,
          rgba(253, 186, 74, 0.55) 0 12px,
          rgba(255, 255, 255, 0) 12px 24px
        );
      }
      .pin.wipwin .wart h2 {
        font-family: var(--pixel);
        font-weight: 700;
        font-size: 17px;
        line-height: 0.95;
        color: var(--ink);
        text-align: center;
      }
      .pin.wipwin .wart h2 .alt {
        color: var(--purple);
      }
      .pin.wipwin .wmsg {
        padding: 11px 9px 12px;
        font-size: 12.5px;
        line-height: 1.5;
        color: #333;
      }
      .pin.wipwin .wmsg b {
        color: var(--purple);
      }
      .win .wbtns {
        display: flex;
        gap: 3px;
        flex: none;
      }
      /* true fullscreen: window fills the entire viewport */
      .win.maxed {
        left: 0 !important;
        top: 0 !important;
        width: 100vw !important;
        height: 100vh;
        z-index: 999;
      }
      .win.maxed .body {
        flex: 1;
        overflow: auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .win.maxed .resize-grip {
        display: none;
      }
      /* true fullscreen (YouTube-style): just the video, auto-hiding controls */
      .win:fullscreen,
      .win:-webkit-full-screen {
        width: 100vw;
        height: 100vh;
        left: 0;
        top: 0;
        border: none;
        box-shadow: none;
        display: flex;
        flex-direction: column;
        background: #000;
      }
      .win:fullscreen .titlebar,
      .win:-webkit-full-screen .titlebar,
      .win:fullscreen .info,
      .win:-webkit-full-screen .info {
        display: none;
      }
      .win:fullscreen .body,
      .win:-webkit-full-screen .body {
        flex: 1;
        min-height: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #000;
      }
      .win:fullscreen .media,
      .win:-webkit-full-screen .media {
        flex: 1;
        min-height: 0;
        margin: 0;
        border: none;
        box-shadow: none;
        aspect-ratio: auto !important;
        background: #000;
      }
      .win:fullscreen .media video,
      .win:fullscreen .media img,
      .win:fullscreen .media iframe,
      .win:-webkit-full-screen .media video,
      .win:-webkit-full-screen .media img,
      .win:-webkit-full-screen .media iframe {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .win:fullscreen .resize-grip,
      .win:-webkit-full-screen .resize-grip {
        display: none;
      }
      /* player becomes an overlay bar along the bottom */
      .win:fullscreen .player {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        margin: 0;
        padding: 16px 22px 18px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
        transition: opacity 0.25s ease;
      }
      .win:fullscreen .player .ptime {
        color: #fff;
      }
      /* exit / close cluster (top-right), used by both images and videos */
      .fsx {
        display: none;
      }
      .win:fullscreen .fsx {
        display: flex;
        gap: 8px;
        position: fixed;
        top: 16px;
        right: 18px;
        transition: opacity 0.25s ease;
      }
      .fsx button {
        width: 34px;
        height: 30px;
        display: grid;
        place-items: center;
        font-size: 14px;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.5);
        cursor: pointer;
      }
      .fsx button:hover {
        background: rgba(0, 0, 0, 0.85);
      }
      /* when idle in fullscreen, hide everything */
      .win:fullscreen.ui-hidden {
        cursor: none;
      }
      .win:fullscreen.ui-hidden .player,
      .win:fullscreen.ui-hidden .fsx {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <a class="back" href="index.html">← back to portfolio</a>

    <header class="head">
      <div class="head-row">
        <h1 class="page-title">sketchbook</h1>
        <button class="shuffle" id="shuffle">
          <svg width="16" height="16" viewBox="0 0 16 16">
            <rect
              x="1"
              y="1"
              width="14"
              height="14"
              fill="#fff"
              stroke="#16121f"
            />
            <rect x="3" y="3" width="2.5" height="2.5" fill="#16121f" />
            <rect x="6.75" y="6.75" width="2.5" height="2.5" fill="#16121f" />
            <rect x="10.5" y="10.5" width="2.5" height="2.5" fill="#16121f" />
          </svg>
          shuffle a piece
        </button>
      </div>
      <p class="page-blurb">
        <b>beyond the work,</b> i just like making stuff. sketches, experiments,
        posters, motion bits, bloops and drafts, the stuff that doesn't usually
        see daylight. still filling this up, so more's on the way.
      </p>
    </header>

    <main class="board" id="board"></main>

        {
          title: "inspired by girlfriend",
          tag: "SKETCH",
          year: "2025",
          ar: "auto",
          kind: "img",
          src: "images/sketchbook/Inspired%20by%20Girlfriend.webp",
        },
      ];

      let zTop = 100,
        nOpen = 0;
      const open = {};
      const isAuto = (w) => !w.ar || w.ar === "auto";

      // ── OPENED-WINDOW SIZE (tweak these two numbers) ──
      const WIN_W = 460; // default width for a piece window
      const WIN_W_LANDSCAPE = 780; // wider default when a piece is landscape (wider than tall)

      function focusWin(el) {
        document
          .querySelectorAll(".win")
          .forEach((w) => w.classList.add("inactive"));
        el.classList.remove("inactive");
        el.style.zIndex = ++zTop;
      }
      function applyAutoRatio(scope) {
        scope.querySelectorAll("img[data-auto]").forEach((img) => {
          const set = () => {
            if (img.naturalWidth && img.naturalHeight) {
              const b = img.closest(".media");
              if (b)
                b.style.setProperty(
                  "--ar",
                  img.naturalWidth + "/" + img.naturalHeight,
                );
            }
          };
          img.complete
            ? set()
            : img.addEventListener("load", set, { once: true });
        });
        scope.querySelectorAll("video[data-auto]").forEach((v) =>
          v.addEventListener(
            "loadedmetadata",
            () => {
              if (v.videoWidth && v.videoHeight) {
                const b = v.closest(".media");
                if (b)
                  b.style.setProperty(
                    "--ar",
                    v.videoWidth + "/" + v.videoHeight,
                  );
              }
            },
            { once: true },
          ),
        );
      }
      function dragify(win) {
        const bar = win.querySelector(".titlebar");
        let sx,
          sy,
          ox,
          oy,
          on = false;
        bar.addEventListener("pointerdown", (e) => {
          if (e.target.closest(".ctrl")) return;
          if (window.innerWidth < 760) return;
          on = true;
          sx = e.clientX;
          sy = e.clientY;
          ox = win.offsetLeft;
          oy = win.offsetTop;
          bar.setPointerCapture(e.pointerId);
          bar.style.cursor = "grabbing";
        });
        bar.addEventListener("pointermove", (e) => {
          if (!on) return;
          win.style.left =
            Math.max(-40, Math.min(ox + e.clientX - sx, innerWidth - 80)) +
            "px";
          win.style.top =
            Math.max(4, Math.min(oy + e.clientY - sy, innerHeight - 60)) + "px";
        });
        bar.addEventListener("pointerup", () => {
          on = false;
          bar.style.cursor = "grab";
        });
      }
      function resizable(win) {
        const g = document.createElement("div");
        g.className = "resize-grip";
        win.appendChild(g);
        let sx,
          sy,
          sw,
          on = false;
        g.addEventListener("pointerdown", (e) => {
          e.stopPropagation();
          on = true;
          sx = e.clientX;
          sy = e.clientY;
          sw = win.offsetWidth;
          g.setPointerCapture(e.pointerId);
        });
        g.addEventListener("pointermove", (e) => {
          if (!on) return;
          win.style.width = Math.max(240, sw + e.clientX - sx) + "px";
        });
        g.addEventListener("pointerup", () => (on = false));
      }
      function wirePlayer(win) {
        const v = win.querySelector("video[data-player]");
        if (!v) return;
        const pp = win.querySelector("[data-pp]"),
          seek = win.querySelector(".seek"),
          time = win.querySelector(".ptime"),
          mute = win.querySelector("[data-mute]");
        let scrub = false;
        const fmt = (s) => {
          s = Math.floor(s || 0);
          return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
        };
        const sync = () =>
          (pp.innerHTML = v.paused ? "&#9654;" : "&#10074;&#10074;");
        const tog = () => (v.paused ? v.play() : v.pause());
        pp.addEventListener("click", tog);
        v.addEventListener("click", tog);
        v.addEventListener("play", sync);
        v.addEventListener("pause", sync);
        v.addEventListener(
          "loadedmetadata",
          () => (time.textContent = "0:00 / " + fmt(v.duration)),
        );
        v.addEventListener("timeupdate", () => {
          if (!scrub && v.duration)
            seek.value = (v.currentTime / v.duration) * 1000;
          time.textContent = fmt(v.currentTime) + " / " + fmt(v.duration);
        });
        seek.addEventListener("input", () => {
          scrub = true;
          if (v.duration) v.currentTime = (seek.value / 1000) * v.duration;
        });
        seek.addEventListener("change", () => (scrub = false));
        mute.addEventListener("click", () => {
          v.muted = !v.muted;
          mute.style.opacity = v.muted ? 0.45 : 1;
        });
        sync();
      }
      function makeWin(id, name, bodyHTML, geom) {
        if (open[id]) {
          focusWin(open[id]);
          return open[id];
        }
        const win = document.createElement("div");
        win.className = "win";
        win.style.left = geom.left + "px";
        win.style.top = geom.top + "px";
        win.style.width = geom.width;
        win.innerHTML =
          '<div class="titlebar"><span class="nm">' +
          name +
          "</span>" +
          '<div class="wbtns">' +
          '<div class="ctrl" data-closeall title="close all windows">&#10697;</div>' +
          '<div class="ctrl" data-max title="fullscreen">&#9633;</div>' +
          '<div class="ctrl" data-close title="close">&#10005;</div>' +
          '</div></div><div class="body">' +
          bodyHTML +
          "</div>" +
          '<div class="fsx">' +
          '<button data-restore title="back to window">&#9633;</button>' +
          '<button data-fclose title="close">&#10005;</button>' +
          "</div>";
        document.body.appendChild(win);
        const maxL = Math.max(4, innerWidth - win.offsetWidth - 4);
        win.style.left = Math.max(4, Math.min(geom.left, maxL)) + "px";
        open[id] = win;
        win.addEventListener("mousedown", () => focusWin(win));
        win.querySelector("[data-close]").addEventListener("click", (e) => {
          e.stopPropagation();
          win.remove();
          delete open[id];
        });
        win.querySelector("[data-closeall]").addEventListener("click", (e) => {
          e.stopPropagation();
          clearAllWindows();
        });
        win.querySelector("[data-max]").addEventListener("click", (e) => {
          e.stopPropagation();
          if (document.fullscreenElement === win) {
            document.exitFullscreen();
          } else if (win.requestFullscreen) {
            win.requestFullscreen().catch(() => win.classList.toggle("maxed"));
          } else {
            win.classList.toggle("maxed");
          }
        });
        // fullscreen exit + close (top-right cluster, works for images too)
        win.querySelector("[data-restore]").addEventListener("click", (e) => {
          e.stopPropagation();
          if (document.fullscreenElement === win) document.exitFullscreen();
        });
        win.querySelector("[data-fclose]").addEventListener("click", (e) => {
          e.stopPropagation();
          if (document.fullscreenElement === win) document.exitFullscreen();
          win.remove();
          delete open[id];
        });
        // auto-hide the controls when idle in fullscreen (YouTube-style)
        let hideTimer;
        function showFsUI() {
          win.classList.remove("ui-hidden");
          clearTimeout(hideTimer);
          hideTimer = setTimeout(() => {
            if (document.fullscreenElement === win)
              win.classList.add("ui-hidden");
          }, 2600);
        }
        win.addEventListener("mousemove", () => {
          if (document.fullscreenElement === win) showFsUI();
        });
        document.addEventListener("fullscreenchange", () => {
          if (document.fullscreenElement === win) showFsUI();
          else {
            win.classList.remove("ui-hidden");
            clearTimeout(hideTimer);
          }
        });
        dragify(win);
        resizable(win);
        focusWin(win);
        return win;
      }
      function openWork(i) {
        const w = works[i];
        const auto = isAuto(w),
          arInit = auto ? "16/9" : w.ar,
          da = auto ? " data-auto" : "";
        let media,
          player = false;
        if (w.kind === "video" && w.embed) {
          if (/\.(mp4|webm)(\?|$)/i.test(w.embed)) {
            player = true;
            media =
              '<div class="media" style="--ar:' +
              arInit +
              '"><video data-player' +
              da +
              ' src="' +
              w.embed +
              '" loop playsinline></video></div>' +
              '<div class="player"><button class="pbtn" data-pp>&#9654;</button>' +
              '<input type="range" class="seek" min="0" max="1000" value="0" />' +
              '<span class="ptime">0:00 / 0:00</span>' +
              '<button class="pbtn" data-mute><svg width="13" height="13" viewBox="0 0 14 14"><path d="M2 5 H4 L7 2 V12 L4 9 H2 Z" fill="#16121f"/><path d="M9 4 Q12 7 9 10" stroke="#16121f" fill="none" stroke-width="1.4"/></svg></button></div>';
          } else {
            media =
              '<div class="media" style="--ar:' +
              arInit +
              '"><iframe src="' +
              w.embed +
              '" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div>';
          }
        } else if (w.kind === "img" && w.src) {
          media =
            '<div class="media" style="--ar:' +
            arInit +
            '"><img' +
            da +
            ' src="' +
            w.src +
            '" alt="' +
            w.title +
            '" /></div>';
        } else {
          media =
            '<div class="media" style="--ar:' +
            (auto ? "1" : w.ar) +
            '"><div class="bigph">' +
            w.title +
            "</div></div>";
        }
        const body =
          media +
          '<div class="info"><strong>' +
          w.title +
          '</strong><span class="yr">' +
          w.year +
          "</span></div>";
        const off = (nOpen++ % 7) * 26;
        const win = makeWin("w-" + i + "-" + Date.now(), w.title, body, {
          left: Math.max(20, innerWidth / 2 - WIN_W / 2 + off),
          top: 70 + off,
          width: "min(" + WIN_W + "px, 92vw)",
        });
        applyAutoRatio(win);
        if (player) wirePlayer(win);
        // landscape pieces (wider than tall) open bigger by default
        (function widenIfLandscape() {
          const apply = (ww, hh) => {
            if (ww && hh && ww > hh * 1.15)
              win.style.width = "min(" + WIN_W_LANDSCAPE + "px, 94vw)";
          };
          const v = win.querySelector("video");
          const im = win.querySelector("img");
          if (v)
            v.addEventListener(
              "loadedmetadata",
              () => apply(v.videoWidth, v.videoHeight),
              { once: true },
            );
          if (im) {
            if (im.complete && im.naturalWidth)
              apply(im.naturalWidth, im.naturalHeight);
            else
              im.addEventListener(
                "load",
                () => apply(im.naturalWidth, im.naturalHeight),
                { once: true },
              );
          }
        })();
      }

      // shuffle bag: show every piece once, in random order, then STOP (no loop)
      let bag = [];
      let started = false;
      let lastShown = null;

      function buildBag() {
        bag = works.map((_, i) => i);
        for (let i = bag.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [bag[i], bag[j]] = [bag[j], bag[i]];
        }
        // on a restart, don't let the first pick repeat the last one shown
        if (
          lastShown != null &&
          bag.length > 1 &&
          bag[bag.length - 1] === lastShown
        ) {
          [bag[bag.length - 1], bag[0]] = [bag[0], bag[bag.length - 1]];
        }
      }

      function clearAllWindows() {
        document.querySelectorAll(".win").forEach((w) => w.remove());
        for (const k in open) delete open[k];
        nOpen = 0;
      }

      function showEndWindow() {
        const body =
          '<div class="endcard">' +
          '<div class="endcard-big">that\'s all i got</div>' +
          "<p>you've seen everything in here, for now. more scraps on the way.</p>" +
          '<button class="endcard-btn" data-startover>start over</button>' +
          "</div>";
        const win = makeWin("end-window", "scratchbook.exe", body, {
          left: innerWidth / 2 - 170,
          top: 96,
          width: "min(340px, 92vw)",
        });
        const btn = win.querySelector("[data-startover]");
        if (btn)
          btn.addEventListener("click", () => {
            clearAllWindows();
            started = false;
            bag = [];
          });
      }

      function doShuffle() {
        if (!started) {
          buildBag();
          started = true;
        } else if (bag.length === 0) {
          showEndWindow();
          return;
        }
        const idx = bag.pop();
        lastShown = idx;
        openWork(idx);
      }

      function renderBoard() {
        const board = document.getElementById("board");
        const btns = ""; // tiles are previews; the real buttons live on the opened window
        const imgIco =
          '<svg class="tico" width="13" height="13" viewBox="0 0 16 16"><rect x="1" y="2" width="14" height="12" fill="#fff" stroke="#16121f"/><circle cx="5" cy="6" r="1.4" fill="#fdba4a"/><path d="M2 13 L6 8 L9 11 L11 9 L14 13 Z" fill="#6513e0"/></svg>';
        const vidIco =
          '<svg class="tico" width="13" height="13" viewBox="0 0 16 16"><rect x="1" y="2" width="14" height="12" fill="#fff" stroke="#16121f"/><path d="M6 5 L11 8 L6 11 Z" fill="#e24632"/></svg>';
        const docIco =
          '<svg class="tico" width="13" height="13" viewBox="0 0 16 16"><path d="M3 1 H10 L13 4 V15 H3 Z" fill="#fff" stroke="#16121f"/><path d="M5 6 H11 M5 8 H11 M5 10 H9" stroke="#16121f"/></svg>';

        // WIP window (info only)
        const wip = document.createElement("div");
        wip.className = "pin wipwin";
        wip.innerHTML =
          '<div class="tbar">' +
          docIco +
          '<span class="tname">readme.txt</span>' +
          btns +
          "</div>" +
          '<div class="wart"><h2>WORK IN <span class="alt">PROGRESS</span></h2></div>' +
          '<div class="wmsg"><b>beyond the work,</b> here it is. i\'m still ' +
          "uploading my stuff, so it's not full yet. come back, there'll be more.</div>";
        board.appendChild(wip);

        // pieces as little windows
        works.forEach((w, i) => {
          const pin = document.createElement("div");
          pin.className = "pin piecewin";
          const isVid = w.kind === "video" && w.embed;
          let media;
          if (w.kind === "img" && w.src) {
            media =
              '<img src="' +
              w.src +
              '" alt="' +
              w.title +
              '" loading="lazy" />';
          } else if (isVid) {
            media =
              '<video src="' +
              w.embed +
              '" muted loop playsinline preload="metadata"></video>';
          } else {
            media = '<div style="aspect-ratio:1/1"></div>';
          }
          const fname =
            (w.title || "untitled")
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, "-")
              .replace(/^-|-$/g, "") + (isVid ? ".mp4" : ".jpg");
          pin.innerHTML =
            '<div class="tbar">' +
            (isVid ? vidIco : imgIco) +
            '<span class="tname">' +
            fname +
            "</span>" +
            btns +
            "</div>" +
            '<div class="pbody"><div class="photo">' +
            media +
            "</div></div>" +
            '<div class="pstatus"><span class="pname">' +
            w.title +
            "</span></div>";
          pin.addEventListener("click", () => openWork(i));
          const v = pin.querySelector("video");
          if (v) {
            pin.addEventListener("mouseenter", () => v.play().catch(() => {}));
            pin.addEventListener("mouseleave", () => v.pause());
          }
          board.appendChild(pin);
        });
      }
      renderBoard();

      document.getElementById("shuffle").addEventListener("click", doShuffle);
    </script>
  </body>
</html>
